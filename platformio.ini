;
; Build:            pio run
; Upload:           pio run -t upload            (add -e PSIPro --upload-port /dev/cu.usbmodemXXXX)
; Host checks:      ./test/host/run.sh
;
; Target is a SparkFun Pro Micro 16 MHz (ATmega32U4): 28,672 B usable flash
; (32 KB minus the 4 KB Caterina bootloader) and 2,560 B SRAM. Flash is the tight
; one — see the CONTRACT_SLIM escape hatch in include/config.h if a future change
; overflows it.
;
; Dependencies are derived from what src/main.cpp actually includes: FastLED, plus
; EEPROM and Wire, which ship with framework-arduino-avr and need no lib_deps entry.
; (The upstream C2B5 collection listed NeoPixel / PWM-Servo / SoftwareSerial / Keypad
; in a block shared with the other boards; this firmware includes none of them.)

[env:PSIPro]
platform = atmelavr
board = sparkfun_promicro16
framework = arduino
; The firmware talks JEDI/serial at 9600 (config.h `_9600BAUDSJEDI_`; 2400 without it).
monitor_speed = 9600
lib_deps =
    fastled/FastLED @ 3.5.0

; ---- flash-size codegen flags (pure codegen; ZERO behaviour change) ----------
; The ATmega32U4 has 28,672 B usable and the contract layer put us over. These four
; flags are size-only knobs — they change where/how GCC emits code, never what it
; computes. Each was measured individually and in combination; all four earn their
; place (dropping any one costs 76-266 B). Total: -1,466 B on top of the source-side
; PSI_NOINLINE change in ContractPSI.h.
;
; Already set by PlatformIO's atmelavr defaults, so NOT repeated here (verified in the
; -v build log): -Os, -flto -fuse-linker-plugin, -ffunction-sections, -fdata-sections,
; -Wl,--gc-sections. There is no free money left in those.
build_flags =
    ; Linker relaxation (-442 B): rewrites CALL/JMP (4 bytes) into RCALL/RJMP (2 bytes)
    ; wherever the target is within reach. Pure encoding; identical semantics.
    -mrelax
    -Wl,--relax
    ; The single biggest win (-1,296 B). AVR has no push-multiple instruction, so every
    ; non-leaf function open-codes a run of push/pop pairs to save call-saved registers.
    ; This replaces those runs with a call to the libgcc __prologue_saves__/
    ; __epilogue_restores__ helpers — a few bytes per function instead of dozens. Costs a
    ; handful of cycles per call, which is irrelevant here: the render loop is gated to
    ; 25 ms and the parser runs once per serial line.
    -mcall-prologues
    ; -108 B. Stops GCC folding ordinary (NOT explicitly-`inline`) small functions into
    ; every caller. Note this flag does NOT cover the `inline`-marked contract helpers —
    ; that is what PSI_NOINLINE in ContractPSI.h is for; the two are complementary.
    -fno-inline-small-functions
    ; -122 B. Loop-invariant hoisting trades flash for speed by materialising invariants
    ; into registers ahead of the loop (and spilling under AVR's tiny register file). We
    ; want the flash back; these loops are all <= NUM_LEDS iterations at 25 ms.
    -fno-move-loop-invariants
    ; -10 B. Trims the last of the automatic (non-`inline`) inlining.
    --param=max-inline-insns-auto=2
;
; REJECTED, deliberately, so nobody "finds" them again:
;   -funsigned-char        saves 32 B but avr-g++ 7.3 defaults `char` to SIGNED
;                          (__CHAR_UNSIGNED__ is undefined). Flipping it would change the
;                          meaning of every char compare in the parser (_hexNib,
;                          _verbFromChar, strncmp) AND desync AVR from the host test build,
;                          which is the one thing contract_core.h exists to prevent.
;                          Not a codegen knob. Never enable this.
;   -fno-inline-functions-called-once   COSTS 1,364 B. The contract parse chain is a chain
;                          of single-call functions; outlining them adds AVR call overhead
;                          without removing a single duplicate byte.
;   -fno-ipa-cp            COSTS 2,068 B. The .constprop clones are paying for themselves.
;   -fno-split-wide-types  COSTS 726 B.   -fno-tree-loop-optimize COSTS 354 B.
