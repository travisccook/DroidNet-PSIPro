<!DOCTYPE html>
<html>
<head>
    <title>Simple PSI Test</title>
    <style>
        body { background: #1a1a1a; color: white; padding: 20px; }
        .led-matrix { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; width: 360px; margin: 20px; }
        .led { width: 24px; height: 24px; border-radius: 50%; background-color: #111; border: 2px solid #222; }
        .led.red { background-color: #ff0000; box-shadow: 0 0 20px #ff0000; }
        .led.blue { background-color: #0080ff; box-shadow: 0 0 20px #0080ff; }
        .led.off { background-color: #111; }
        .led.empty { visibility: hidden; }
    </style>
</head>
<body>
    <h1>Simple PSI Test</h1>
    <div class="led-matrix" id="frontMatrix"></div>
    <button onclick="testPattern()">Test Pattern</button>
    <button onclick="allOn()">All On</button>
    <button onclick="allOff()">All Off</button>
    <div id="debug"></div>
    
    <script>
        const ledMatrix = [
            [-1, -1, 23, 24, -1, -1],
            [-1,  6, 22, 25, 41, -1],
            [ 5,  7, 21, 26, 40, 42],
            [ 4,  8, 20, 27, 39, 43],
            [ 3,  9, 19, 28, 38, 44],
            [ 2, 10, 18, 29, 37, 45],
            [ 1, 11, 17, 30, 36, 46],
            [ 0, 12, 16, 31, 35, 47],
            [-1, 13, 15, 32, 34, -1],
            [-1, -1, 14, 33, -1, -1]
        ];
        
        let frontLeds = [];
        
        // Initialize
        function initializeLEDs() {
            const container = document.getElementById('frontMatrix');
            container.innerHTML = '';
            frontLeds.length = 0;
            
            for (let row = 0; row < 6; row++) {
                for (let col = 0; col < 10; col++) {
                    const led = document.createElement('div');
                    const ledIndex = ledMatrix[col][row];
                    
                    if (ledIndex === -1) {
                        led.className = 'led empty';
                    } else {
                        led.className = 'led off';
                        frontLeds[ledIndex] = led;
                    }
                    
                    container.appendChild(led);
                }
            }
            
            document.getElementById('debug').innerHTML = 'Initialized ' + frontLeds.filter(l => l).length + ' LEDs';
        }
        
        function setLED(index, color) {
            if (frontLeds[index]) {
                frontLeds[index].className = 'led ' + color;
            }
        }
        
        function testPattern() {
            // Create a simple pattern
            for (let i = 0; i < 48; i++) {
                if (i % 2 === 0) {
                    setLED(i, 'red');
                } else {
                    setLED(i, 'blue');
                }
            }
        }
        
        function allOn() {
            for (let i = 0; i < 48; i++) {
                setLED(i, 'red');
            }
        }
        
        function allOff() {
            for (let i = 0; i < 48; i++) {
                setLED(i, 'off');
            }
        }
        
        // Initialize on load
        initializeLEDs();
    </script>
</body>
</html>
